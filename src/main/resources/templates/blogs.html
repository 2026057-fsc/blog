<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログ</title>
</head>
<body>
    <h1>Blog</h1>

    <div class="list" th:if="${!#lists.isEmpty(blogsList)}">
        <ul>
            <li th:each="blogs : ${blogsList}">
                <h2>
                    <a th:href="@{/Blogs/{id}(id=${blogs.id})}" th:text="${blogs.title}">タイトル</a>
                </h2>

                <p th:text="${blogs.notes}">本文</p>

                <p th:text="${blogs.author}">著者</p>


            </li>
        </ul>
    </div>
</body>
</html>
